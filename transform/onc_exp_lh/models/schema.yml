models:
  - name: dim_experiments
    description: Current-state experiment dimension table implementing SCD Type 1 overwrite behavior.

    columns:
      - name: experiment_id
        description: Unique experiment identifier.
        tests:
          - not_null
          - unique

      - name: experiment_name
        description: Experiment name.

      - name: project
        description: Project code associated with the experiment.

      - name: experiment_status
        description: Current experiment lifecycle status.

      - name: run_date
        description: Date the experiment was run.

      - name: experiment_author
        description: Experiment author.

      - name: witnessed_by
        description: Person who witnessed the experiment.

      - name: protocol_name
        description: Name of the protocol used.

      - name: protocol_code
        description: Protocol code used for the experiment.

      - name: protocol_version
        description: Protocol version used for the experiment.

      - name: created_at
        description: Timestamp when the experiment was created.

      - name: signed_at
        description: Timestamp when the experiment was signed by the author.

      - name: witnessed_at
        description: Timestamp when the experiment was witnessed.

      - name: is_signed
        description: Indicates whether the experiment has been signed.

      - name: is_witnessed
        description: Indicates whether the experiment has been witnessed.

      - name: days_created_to_signed
        description: Number of days between experiment creation and signing.

      - name: days_signed_to_witnessed
        description: Number of days between signing and witnessing.

      - name: ingest_date
        description: Latest ingest date associated with the experiment record.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.

  - name: dim_samples
    description: Current-state sample dimension table implementing SCD Type 1 overwrite behavior.

    columns:
      - name: sample_id
        description: Unique sample identifier.
        tests:
          - not_null
          - unique

      - name: sample_name
        description: Sample name.

      - name: internal_code
        description: Internal sample tracking code.

      - name: sample_type
        description: Type of sample, such as cell line, plasma fraction, protein extract, tumor sample, PBMC, or antibody candidate.

      - name: created_by
        description: Person who created the sample record.

      - name: created_at
        description: Timestamp when the sample record was created.

      - name: updated_at
        description: Timestamp when the sample record was last updated.

      - name: cell_line_name
        description: Name of the cell line, if applicable.

      - name: cell_line_tissue_origin
        description: Tissue origin of the cell line, if applicable.

      - name: cell_line_passage_number
        description: Passage number of the cell line, if applicable.

      - name: plasma_fraction_type
        description: Plasma fraction type, if applicable.

      - name: plasma_donor_pool_size
        description: Number of donors represented in the plasma pool, if applicable.

      - name: plasma_pathogen_screening_status
        description: Pathogen screening status for the plasma sample, if applicable.

      - name: plasma_storage_temperature_c
        description: Plasma storage temperature in Celsius, if applicable.

      - name: protein_source_material
        description: Source material used for protein extraction, if applicable.

      - name: protein_lysis_buffer
        description: Lysis buffer used for protein extraction, if applicable.

      - name: protein_yield_mg
        description: Protein yield in milligrams, if applicable.

      - name: protein_purity_percent
        description: Protein purity percentage, if applicable.

      - name: tumor_type
        description: Tumor type, if applicable.

      - name: tumor_stage
        description: Tumor stage, if applicable.

      - name: tumor_collection_site
        description: Tumor collection site, if applicable.

      - name: tumor_necrosis_percent
        description: Tumor necrosis percentage, if applicable.

      - name: pbmc_donor_id
        description: PBMC donor identifier, if applicable.

      - name: pbmc_viability_percent
        description: PBMC viability percentage, if applicable.

      - name: pbmc_isolation_method
        description: PBMC isolation method, if applicable.

      - name: pbmc_cryopreserved
        description: Indicates whether the PBMC sample was cryopreserved, if applicable.

      - name: antibody_format
        description: Antibody format, if applicable.

      - name: antibody_target_antigen
        description: Antibody target antigen, if applicable.

      - name: antibody_clone_id
        description: Antibody clone identifier, if applicable.

      - name: antibody_binding_affinity_nm
        description: Antibody binding affinity in nanomolar, if applicable.

      - name: antibody_humanized
        description: Indicates whether the antibody candidate is humanized, if applicable.

      - name: ingest_date
        description: Latest ingest date associated with the sample record.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.

  - name: dim_stocks
    description: Current-state stock inventory dimension table implementing SCD Type 1 overwrite behavior.

    columns:
      - name: stock_id
        description: Unique stock inventory identifier.
        tests:
          - not_null
          - unique

      - name: sample_id
        description: Identifier of the associated sample.

      - name: stock_owner
        description: Owner of the stock inventory.

      - name: lot_number
        description: Lot number associated with the stock inventory.

      - name: quantity
        description: Quantity currently available in inventory.

      - name: quantity_unit
        description: Unit associated with the stock quantity.

      - name: concentration
        description: Concentration of the stock material.

      - name: concentration_unit
        description: Unit associated with the concentration measurement.

      - name: storage_location
        description: Storage location of the stock inventory.

      - name: created_at
        description: Timestamp when the stock inventory record was created.

      - name: stored_at
        description: Timestamp when the stock material was stored.

      - name: expiry_date
        description: Expiration date of the stock material.

      - name: updated_at
        description: Timestamp when the stock inventory record was last updated.

      - name: is_expired
        description: Indicates whether the stock material is expired.

      - name: is_depleted
        description: Indicates whether the stock quantity is depleted.

      - name: days_until_expiry
        description: Number of days remaining until the stock material expires.

      - name: ingest_date
        description: Latest ingest date associated with the stock inventory record.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.

  - name: fct_screening_results
    description: Fact table containing antibody screening assay result measurements generated from oncology immunotherapy R&D workflows.

    columns:
      - name: result_id
        description: Unique screening result identifier.
        tests:
          - not_null
          - unique

      - name: experiment_id
        description: Identifier of the associated experiment.
        tests:
          - relationships:
              to: ref('dim_experiments')
              field: experiment_id

      - name: sample_id
        description: Identifier of the associated antibody candidate sample.
        tests:
          - relationships:
              to: ref('dim_samples')
              field: sample_id

      - name: stock_id
        description: Identifier of the associated stock inventory record.
        tests:
          - relationships:
              to: ref('dim_stocks')
              field: stock_id

      - name: protocol_code
        description: Protocol code associated with the assay workflow.

      - name: assay_name
        description: Name of the screening assay.

      - name: assay_category
        description: High-level category of the screening assay.

      - name: endpoint_name
        description: Measured assay endpoint.

      - name: endpoint_unit
        description: Unit associated with the endpoint measurement.

      - name: replicate_number
        description: Replicate number associated with the assay measurement.

      - name: endpoint_value
        description: Numeric value of the assay endpoint measurement.

      - name: treatment_concentration
        description: Concentration of treatment material applied during the assay.

      - name: treatment_concentration_unit
        description: Unit associated with the treatment concentration.

      - name: measurement_timepoint_hours
        description: Timepoint in hours when the assay measurement was captured.

      - name: control_type
        description: Experimental control designation.

      - name: qc_flag
        description: Quality control status associated with the result.

      - name: is_qc_pass
        description: Indicates whether the result passed quality control checks.

      - name: is_control
        description: Indicates whether the result corresponds to a control condition rather than a test article.

      - name: instrument_name
        description: Instrument used to generate the assay measurement.

      - name: ingest_date
        description: Latest ingest date associated with the screening result record.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.

  - name: dim_antibody_candidates
    description: Dimension table containing descriptive antibody candidate sample and stock inventory information.

    columns:
      - name: sample_id
        description: Unique identifier for the antibody candidate sample.
        tests:
          - not_null

      - name: sample_name
        description: Name of the antibody candidate sample.

      - name: internal_code
        description: Internal tracking code associated with the antibody candidate sample.

      - name: sample_type
        description: Type of sample. Expected to be antibody_candidate for all records in this dimension.

      - name: created_by
        description: User who created the antibody candidate sample record.

      - name: created_at
        description: Timestamp when the antibody candidate sample record was created.

      - name: updated_at
        description: Timestamp when the antibody candidate sample record was last updated.

      - name: antibody_clone_id
        description: Identifier of the antibody clone.

      - name: antibody_target_antigen
        description: Target antigen associated with the antibody candidate.

      - name: antibody_format
        description: Molecular format of the antibody candidate.

      - name: antibody_binding_affinity_nm
        description: Reference antibody binding affinity in nanomolar from the sample metadata.

      - name: antibody_humanized
        description: Indicates whether the antibody candidate is humanized.

      - name: stock_id
        description: Unique identifier for the stock inventory record.
        tests:
          - not_null
          - unique

      - name: stock_owner
        description: Owner of the stock inventory.

      - name: lot_number
        description: Lot number associated with the stock inventory.

      - name: quantity
        description: Available quantity of the stock inventory.

      - name: quantity_unit
        description: Unit associated with the stock quantity.

      - name: concentration
        description: Concentration of the stock material.

      - name: concentration_unit
        description: Unit associated with the stock concentration.

      - name: storage_location
        description: Physical storage location of the stock inventory.

      - name: stock_created_at
        description: Timestamp when the stock inventory record was created.

      - name: stored_at
        description: Timestamp when the stock material was stored.

      - name: expiry_date
        description: Expiration date of the stock material.

      - name: stock_updated_at
        description: Timestamp when the stock inventory record was last updated.

      - name: is_expired
        description: Indicates whether the stock material is expired.

      - name: is_depleted
        description: Indicates whether the stock quantity is depleted.

      - name: days_until_expiry
        description: Number of days remaining until the stock material expires.

      - name: ingest_date
        description: Latest ingest date associated with the combined sample and stock record.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.

  - name: mart_antibody_candidate_summary
    description: Gold-layer mart summarizing antibody candidate screening performance across assay results.

    columns:
      - name: sample_id
        description: Unique sample identifier for the antibody candidate.
        tests:
          - not_null
          - unique

      - name: sample_name
        description: Sample name for the antibody candidate.

      - name: antibody_clone_id
        description: Identifier of the antibody clone.

      - name: antibody_target_antigen
        description: Target antigen of the antibody candidate.

      - name: antibody_format
        description: Antibody molecular format.

      - name: antibody_humanized
        description: Indicates whether the antibody candidate is humanized.

      - name: avg_binding_affinity_nm
        description: Average antibody binding affinity in nanomolar. Lower values generally indicate stronger binding.

      - name: avg_cytotoxicity_percent
        description: Average tumor cytotoxicity percentage across relevant screening results.

      - name: avg_cytokine_release_pg_ml
        description: Average cytokine release measurement across cytokine assay endpoints.

      - name: avg_activation_or_inhibition_percent
        description: Average immune activation or checkpoint inhibition percentage across relevant assay endpoints.

      - name: num_experiments
        description: Number of distinct experiments associated with the antibody candidate.

      - name: num_stocks_tested
        description: Number of distinct stock records tested for the antibody candidate.

      - name: num_screening_results
        description: Number of screening result records associated with the antibody candidate.

      - name: qc_pass_rate
        description: Proportion of screening result records that passed quality control.

      - name: latest_screening_ingest_date
        description: Latest ingestion date represented in the candidate screening results.

      - name: candidate_recommendation
        description: Rule-based recommendation for candidate advancement based on binding affinity, cytotoxicity, and QC pass rate.

      - name: dbt_updated_at
        description: Timestamp when the dbt model last updated the record.