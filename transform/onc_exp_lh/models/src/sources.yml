sources:
  - name: onc_exp_lh
    description: "Source models for the Oncology Experimental Lakehouse."
    schema: lakehouse_raw
    tables:
      - name: raw_experiments
        columns:
          - name: id
            description: "Primary key for the raw experiments record."
          - name: name
            description: "Experiment name in the raw source."
          - name: project
            description: "Project associated with the raw experiment."
          - name: status
            description: "Raw experiment status."
          - name: run_date
            description: "Experiment run date in the raw source."
          - name: author
            description: "Author of the raw experiment."
          - name: witnessed_by
            description: "Person who witnessed the raw experiment."
          - name: protocol_name
            description: "Protocol name used by the raw experiment."
          - name: protocol_code
            description: "Protocol code used by the raw experiment."
          - name: protocol_version
            description: "Protocol version used by the raw experiment."
          - name: created_at
            description: "Raw experiment creation timestamp."
          - name: signed_at
            description: "Raw experiment sign-off timestamp."
          - name: witnessed_at
            description: "Raw experiment witnessed timestamp."
          - name: record_hash
            description: "Hash for the raw experiment record."
          - name: ingest_date
            description: "Raw experiment ingest date."
      - name: raw_samples
        columns:
          - name: id
            description: "Primary key for the raw sample record."
          - name: name
            description: "Sample name in the raw source."
          - name: internal_code
            description: "Internal code for the sample."
          - name: sample_type
            description: "Type of sample in the raw source."
          - name: created_by
            description: "User who created the raw sample record."
          - name: created_at
            description: "Raw sample creation timestamp."
          - name: updated_at
            description: "Raw sample last update timestamp."
          - name: run_date
            description: "Run date associated with the sample."
          - name: cell_line_name
            description: "Cell line name for the raw sample."
          - name: tissue_origin
            description: "Tissue origin for the raw sample."
          - name: passage_number
            description: "Passage number for the raw sample."
          - name: record_hash
            description: "Hash for the raw sample record."
          - name: ingest_date
            description: "Raw sample ingest date."
      - name: raw_stocks
        columns:
          - name: id
            description: "Primary key for the raw stock record."
          - name: sample_id
            description: "Foreign key referencing the raw sample associated with this stock."
          - name: stock_owner
            description: "Owner of the stock entry."
          - name: lot_number
            description: "Lot number for the stock entry."
          - name: quantity
            description: "Recorded quantity of the stock."
          - name: quantity_unit
            description: "Unit of measure for the stock quantity."
          - name: concentration
            description: "Stock concentration value."
          - name: concentration_unit
            description: "Unit of measure for the stock concentration."
          - name: storage_location
            description: "Storage location for the stock entry."
          - name: created_at
            description: "Raw stock creation timestamp."
          - name: stored_at
            description: "Date when the stock was stored."
          - name: expiry_date
            description: "Expiry date for the stock."
          - name: updated_at
            description: "Raw stock last update timestamp."
          - name: record_hash
            description: "Hash for the raw stock record."
          - name: ingest_date
            description: "Raw stock ingest date."

      - name: raw_screening_results
        description: Raw antibody screening assay result records ingested from experimental assay pipelines.

        columns:
          - name: result_id
            description: Unique screening result identifier.
            tests:
              - not_null
              - unique

          - name: experiment_id
            description: Identifier of the associated experiment.

          - name: sample_id
            description: Identifier of the associated antibody candidate sample.

          - name: stock_id
            description: Identifier of the associated stock inventory record.

          - name: protocol_code
            description: Protocol code associated with the assay workflow.

          - name: protocol_name
            description: Name of the assay protocol.

          - name: protocol_version
            description: Version of the assay protocol.

          - name: antibody_clone_id
            description: Identifier of the antibody clone being screened.

          - name: antibody_target_antigen
            description: Target antigen of the antibody candidate.

          - name: antibody_format
            description: Antibody molecular format.

          - name: antibody_humanized
            description: Indicates whether the antibody candidate is humanized.

          - name: assay_category
            description: High-level category of the assay.

          - name: assay_name
            description: Name of the screening assay.

          - name: endpoint_name
            description: Measured assay endpoint.

          - name: endpoint_unit
            description: Unit associated with the endpoint measurement.

          - name: endpoint_value
            description: Numeric value of the assay endpoint measurement.

          - name: treatment_concentration
            description: Concentration of treatment material applied during the assay.

          - name: treatment_concentration_unit
            description: Unit associated with the treatment concentration.

          - name: control_type
            description: Experimental control designation.

          - name: replicate_number
            description: Replicate number associated with the assay measurement.

          - name: measurement_timepoint_hours
            description: Timepoint in hours when the assay measurement was captured.

          - name: instrument_name
            description: Instrument used to generate the assay measurement.

          - name: qc_flag
            description: Quality control status associated with the result.

          - name: ingest_date
            description: Lakehouse ingestion partition date associated with the record.